version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: inventra-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-inventra}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-inventra_secret}
      MONGO_INITDB_DATABASE: inventra
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - inventra-net
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inventra-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-inventra}:${MONGO_PASS:-inventra_secret}@mongo:27017/inventra?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_refresh_secret_too}
      JWT_REFRESH_EXPIRES_IN: 30d
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Inventra <noreply@inventra.io>}
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - inventra-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: inventra-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - inventra-net

volumes:
  mongo_data:
  uploads_data:
  logs_data:

networks:
  inventra-net:
    driver: bridge
